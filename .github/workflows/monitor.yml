name: Daily Roll Call Monitor

on:
  schedule:
    # 每天北京时间 10:00 (UTC 2:00)
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run monitoring and send report
        env:
          APP_URL: ${{ secrets.APP_URL }}
          MONITOR_API_KEY: ${{ secrets.MONITOR_API_KEY }}
          QQ_SENDER_EMAIL: ${{ secrets.QQ_SENDER_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: python .github/scripts/send_report.py

