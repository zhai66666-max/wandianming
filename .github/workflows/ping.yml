name: Keep Alive Ping

on:
  schedule:
    # 每 5 分钟 ping 一次，防止 Render 免费层休眠（15分钟窗口）
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -s "${{ secrets.APP_URL }}/api/ping" --max-time 10 || true
