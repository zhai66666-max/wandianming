name: Sync Check-in Data to GitHub

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download check-in data from Render
        run: |
          curl -s "${{ secrets.APP_URL }}/api/checkins/all?key=${{ secrets.MONITOR_API_KEY }}" \
            --max-time 30 --retry 2 -o data/checkins.json
          count=$(python3 -c "import json; print(len(json.load(open('data/checkins.json'))))" 2>/dev/null || echo 0)
          echo "Records: $count"

      - name: Push to data branch (does NOT trigger Render deploy)
        run: |
          git config user.name "data-sync-bot"
          git config user.email "bot@sync.local"
          # 切到独立 data 分支，不影响 main（Render 只监听 main）
          git checkout -B data
          git add data/checkins.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "data: sync check-in records"
            git push -f origin data
            echo "✅ Synced to data branch"
          fi
